name: Deploy AIVFX to VPS

on:
  push:
    branches:
      - main 
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Скачиваем свежий код
        uses: actions/checkout@v4

      - name: ⚙️ Настраиваем Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Устанавливаем зависимости
        run: npm install

      - name: 🏗️ Собираем проект
        run: npm run build

      - name: 🚀 Отправляем готовые файлы на сервер
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-rlgoDzvc -i --delete"
          SOURCE: "build/" 
          REMOTE_HOST: ${{ secrets.SERVER_IP }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          TARGET: "/var/www/aivfx/"
